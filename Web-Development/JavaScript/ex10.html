<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Ex10</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT"
      crossorigin="anonymous"
    />
    <script src="script.js" defer></script>
  </head>

  <body>
    <header></header>
    <main>
      <h1 class="text-center py-3">Ex10 - Fetch Data from reqres.in</h1>
      <div class="container">
        <button class="btn btn-primary">Fetch Data</button>
        <ul class="list-group py-3" id="myList">
          <li class="list-group-item" style="color: green">name - year</li>
        </ul>
      </div>
    </main>
    <footer>
      <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.min.js"
      integrity="sha384-7VPbUDkoPSGFnVtYi0QogXtr74QeVeeIs99Qfg5YCF+TidwNdjvaKZX19NZ/e6oz"
      crossorigin="anonymous"
    ></script>

    <script>
      const myList = document.querySelector("#myList");
      const fetchBtn = document.querySelector("button");
      const container = document.querySelector(".container");

      const pagination = document.createElement("nav");
      pagination.className = "mt-3";
      container.appendChild(pagination);

      const renderPagination = (currentPage) => {
        pagination.innerHTML = "";

        const ul = document.createElement("ul");
        ul.className = "pagination justify-content-center";

        for (let i = 1; i <= totalPages; i++) {
          const li = document.createElement("li");
          li.className = `page-item ${i === currentPage ? "active" : ""}`;

          const a = document.createElement("a");
          a.className = "page-link";
          a.href = "#";
          a.textContent = i;

          a.addEventListener("click", (e) => {
            e.preventDefault();
            fetchData(i);
          });

          li.appendChild(a);
          ul.appendChild(li);
        }

        pagination.appendChild(ul);
      };

      let totalPages = 0;

      const fetchData = async (page = 1) => {
        const res = await fetch(`https://reqres.in/api/unknown?page=${page}`, {
          headers: { "x-api-key": "reqres-free-v1" },
        });

        const json = await res.json();
        totalPages = json.total_pages;

        myList.innerHTML = "";

        json.data.forEach((item) => {
          const li = document.createElement("li");
          li.className = "list-group-item";
          li.style.color = item.color;
          li.innerText = `${item.name} - ${item.year}`;
          myList.appendChild(li);
        });

        renderPagination(page);
      };

      fetchBtn.addEventListener("click", async () => {
        await fetchData();
      });
    </script>
  </body>
</html>
